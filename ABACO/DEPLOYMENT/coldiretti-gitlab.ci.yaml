variables:
    ABACOFARMER_DEV_NAMESPACE: "abacofarmer-dev"

.prepare-cache: &prepare-cache-def
    stage: build
    cache:
        key:
            files:
                - package-lock.json
        policy: pull-push
        paths:
            - ./node_modules
    script:
        - npm ci

.build: &build-def
    stage: build
    cache:
        key:
            files:
                - package-lock.json
        policy: pull
        paths:
            - ./node_modules
    artifacts:
        expire_in: 96 hrs
        paths:
            - $CI_PROJECT_DIR/dist/$MODE
    script:
        # - npm ci
        - NODE_ENV=production npm run lint
        - npm dedupe
        - "cp ./themes/${MODE}.scss ./src/assets/styles/themes/ || :"
        - "rm $CI_PROJECT_DIR/dist/$MODE/general-config.json || true" #02-12-2023 Add "|| true" to make process not fail at this point
        - NODE_OPTIONS=--max-old-space-size=14334 ./node_modules/.bin/vue-cli-service build --mode $MODE --report

.build-image: &build-image-def
    stage: build-image
    image:
        name: gcr.io/kaniko-project/executor:debug
        entrypoint: [""]
    rules:
        - if: '$CI_COMMIT_BRANCH == "master"'
    script:
        - mkdir -p /kaniko/.docker
        - echo "$DOCKER_AUTH_CONFIG" > /kaniko/.docker/config.json
        - mv $CI_PROJECT_DIR/dist $CI_PROJECT_DIR/artifact
        - mv $CI_PROJECT_DIR/artifact/$MODE $CI_PROJECT_DIR/dist
        - if [ $MODE = "portal" ];
          then
          export NAME=$MODE;
          export DOCKER_REPO_PREFIX=abaco;
          else
          export NAME=portal-$MODE;
          export DOCKER_REPO_PREFIX=$MODE;
          fi
        - export CONTAINER_REGISTRY=$NEXUS_CONTAINER_REGISTRY_URL/$DOCKER_REPO_PREFIX;
        - export IMAGE_NAME=$NAME:$CI_COMMIT_SHORT_SHA-dev;
        - /kaniko/executor --context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile --destination $CONTAINER_REGISTRY/$IMAGE_NAME

.build-image-release: &build-image-release-def
    stage: build-image
    image:
        name: gcr.io/kaniko-project/executor:debug
        entrypoint: [""]
    rules:
        - if: "$CI_COMMIT_TAG"
    script:
        - mkdir -p /kaniko/.docker
        - echo "$DOCKER_AUTH_CONFIG" > /kaniko/.docker/config.json
        - mv $CI_PROJECT_DIR/dist $CI_PROJECT_DIR/artifact
        - mv $CI_PROJECT_DIR/artifact/$MODE $CI_PROJECT_DIR/dist
        - if [ $MODE = "portal" ];
          then
          export NAME=$MODE;
          export DOCKER_REPO_PREFIX=abaco;
          else
          export NAME=portal-$MODE;
          export DOCKER_REPO_PREFIX=$MODE;
          fi
        - export CONTAINER_REGISTRY=$NEXUS_CONTAINER_REGISTRY_URL/$DOCKER_REPO_PREFIX;
        - export IMAGE_NAME=$NAME:$CI_COMMIT_TAG;
        - /kaniko/executor --context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile --destination $CONTAINER_REGISTRY/$IMAGE_NAME

security-scan:
    stage: build
    # needs:
    #   - test
    image:
        name: docker-registry.fe.abacogroup.eu/aquasec/trivy:latest
        entrypoint: [""]
    variables:
        TRIVY_CACHE_DIR: ".trivycache/"
    cache:
        key: "trivy-db"
        paths:
            - .trivycache/
    artifacts:
        paths:
            - $CI_PROJECT_DIR/security-scan/
    script:
        - trivy --version
        - mkdir -p .trivycache/
        - mkdir -p "$CI_PROJECT_DIR/security-scan/"
        # cache cleanup is needed when scanning images with the same tags, it does not remove the database
        - time trivy clean --scan-cache
        - time trivy fs -q --download-db-only
        - trivy fs --exit-code 0 -f table -o "$CI_PROJECT_DIR/security-scan/results.txt" $CI_PROJECT_DIR
        - trivy fs --exit-code 1 --severity HIGH $CI_PROJECT_DIR
    allow_failure: true
    rules:
        - if: '$CI_COMMIT_BRANCH == "master"'

.chart-push: &chart-push-def
    stage: helm
    image:
        name: $KUBETOOLS_IMAGE
    script:
        - helm repo add nexus $NEXUS_REPO --username $NEXUS_USERNAME --password $NEXUS_PASSWORD
        - helm dependency update $CI_PROJECT_DIR/helm
        - if [ $MODE = "portal" ];
          then
          export NAME=$MODE;
          export DOCKER_REPO_PREFIX=abaco;
          else
          export NAME=portal-$MODE;
          export DOCKER_REPO_PREFIX=$MODE;
          fi
        - if [ $CI_COMMIT_BRANCH = "master" ];
          then
          export VER=v0.0.$(date +"%s");
          export CONTAINER_REGISTRY=localhost:32000/$DOCKER_REPO_PREFIX;
          export IMAGE_NAME=$NAME:$CI_COMMIT_SHORT_SHA-dev;
          else
          export VER=$CI_COMMIT_TAG;
          export CONTAINER_REGISTRY=$ABACO_CONTAINER_REGISTRY_URL/$DOCKER_REPO_PREFIX;
          export IMAGE_NAME=$NAME:$CI_COMMIT_TAG;
          fi
        - yq e ".image = \"$IMAGE_NAME\"" -i ${CI_PROJECT_DIR}/helm/values.yaml
        - yq e ".containerRegistry = \"$CONTAINER_REGISTRY\"" -i ${CI_PROJECT_DIR}/helm/values.yaml
        - yq e ".version = \"${VER}\"" -i ${CI_PROJECT_DIR}/helm/Chart.yaml
        - yq e ".appVersion = \"${VER}\"" -i ${CI_PROJECT_DIR}/helm/Chart.yaml
        - yq e ".name = \"${NAME}\"" -i ${CI_PROJECT_DIR}/helm/Chart.yaml
        - helm package ${CI_PROJECT_DIR}/helm
        - curl -u $NEXUS_USERNAME:$NEXUS_PASSWORD $NEXUS_REPO --upload-file *.tgz -v

.k8s-deploy: &k8s-deploy-def
    stage: deploy-dev
    image:
        name: $KUBETOOLS_IMAGE
    script:
        - mkdir -p ~/.kube
        - echo -n "$KUBE_CONFIG" > ~/.kube/config && chmod -R 700 ~/.kube
        - helm repo add nexus $NEXUS_REPO --username $NEXUS_USERNAME --password $NEXUS_PASSWORD
        - helm repo update
        - if [ $MODE = $CI_PROJECT_NAME ];
          then
          export NAME=$CI_PROJECT_NAME;
          export VALUES_FILE=$CI_PROJECT_DIR/k8s/values-dev.yaml;
          else
          export NAME=$CI_PROJECT_NAME-$MODE;
          export VALUES_FILE=$CI_PROJECT_DIR/k8s/values-dev-$MODE.yaml;
          fi
        - helm upgrade --install ${NAME} --version=$VER nexus/${NAME} -f $VALUES_FILE -n $NAMESPACE --wait --timeout 5m

.package-create: &package-create-def
    stage: package
    artifacts:
        name: $NAME
        expire_in: 96 hrs
        paths:
            - $CI_PROJECT_DIR
    image: ubuntu
    script:
        - if [ -d "$CI_PROJECT_DIR/package/$MODE" ];
          then
          cp -a $CI_PROJECT_DIR/package/$MODE/* $CI_PROJECT_DIR/dist/$MODE/;
          fi
        - cd ..
        - mkdir ./dist
        - mv $CI_PROJECT_DIR/dist/$MODE/* ./dist
        - cd $CI_PROJECT_DIR
        - rm -rf ..?* .[!.]* *
        - mv ../dist/* $CI_PROJECT_DIR/
        - rm $CI_PROJECT_DIR/

stages:
    - build
    - build-image
    - helm
    - deploy-dev
    - package

